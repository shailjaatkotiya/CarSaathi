services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ridesaathi
      POSTGRES_USER: ridesaathi
      POSTGRES_PASSWORD: ridesaathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://ridesaathi:ridesaathi@postgres:5432/ridesaathi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-me-in-production
      AADHAAR_ENCRYPTION_KEY: ""
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
