name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/carthi-backend:${{ github.sha }} -t $REGISTRY/carthi-backend:latest ./backend
          docker push $REGISTRY/carthi-backend --all-tags

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/carthi-frontend:${{ github.sha }} -t $REGISTRY/carthi-frontend:latest ./frontend
          docker push $REGISTRY/carthi-frontend --all-tags

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/carthi
            REGION="${{ secrets.AWS_REGION }}"
            # Derive the ECR registry on the box (instance role grants ECR pull).
            # Avoids relying on a cross-job output that can arrive empty and make
            # docker login default to Docker Hub, poisoning ~/.docker/config.json.
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
            # Clear any stale/corrupt auth before logging in fresh.
            rm -f ~/.docker/config.json
            aws ecr get-login-password --region "$REGION" \
              | docker login --username AWS --password-stdin "$REGISTRY"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps
